<body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5efe6; /* Beige */
    color: #5c4033;
}

header {
    background-color: #e8dccd;
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    margin: 0;
    font-size: 48px;
}

header p {
    font-size: 20px;
    margin-top: 10px;
}

.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h2 {
    font-size: 36px;
    margin-bottom: 10px;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px 40px 60px;
}

.card {
    background: #fffaf3;
    width: 300px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    margin: 15px;
    font-size: 24px;
}

.card p {
    margin: 0 15px 20px;
    line-height: 1.6;
}

footer {
    background-color: #e8dccd;
    text-align: center;
    padding: 20px;
    font-size: 14px;
}
